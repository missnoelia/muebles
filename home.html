<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA - Home</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="navbar">
    <a href="home.html" class="logo-link">
        <div class="logo-container">
            <div class="logo-circle">
                <img src="img/image-Photoroom.png" alt="DNA Logo" class="logo-image">
            </div>
            <span class="brand-name">DNA</span>
        </div>
    </a>

    <nav class="nav-links">
        <a href="home.html">Home</a>
        <a href="#">Sobre nosotros</a>
        <a href="#">Productos</a>
        <a href="#">Contacto</a>
    </nav>

    <div class="nav-icons">
        <i class="fa-solid fa-cart-shopping"></i>
        <i class="fa-regular fa-user"></i>
    </div>
</header>

    <main class="home-container">
        <section class="selection-banner">
            <div class="banner-image-container">
                <img src="img/Gemini_Generated_Image_kkfc2pkkfc2pkkfc.png" alt="Ambiente" class="banner-img">
            </div>
            <div class="banner-text">
                <h1>Elige la zona que quieras transformar</h1>
                <p>Encuentra muebles diseñados para cada espacio</p>
                <div class="tags">
                    <span>CALIDAD SUPREMA</span>
                    <span>DISEÑOS DE CALIDAD</span>
                    <span>VERSÁTILES</span>
                    <button class="learn-more">VER MÁS <i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </div>
        </section>

        <main class="home-container">
    <section class="categories-section">
        <button class="slider-arrow prev" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></button>
        
        <div class="slider-wrapper">
            <div class="categories-grid" id="sliderGrid">
                <div class="category-card" style="background-image: url(img/unnamed.jpg);">
                    <div class="card-overlay">
                        <h2 class="card-title">Dormitorio</h2>
                    </div>
                </div>
                <div class="category-card" style="background-image: url(img/Gemini_Generated_Image_kkfc2pkkfc2pkkfc\ \(3\).png);">
                    <div class="card-overlay">
                        <h2 class="card-title">Baño</h2>
                    </div>
                </div>
                <div class="category-card" style="background-image: url(img/Gemini_Generated_Image_kkfc2pkkfc2pkkfc\ \(2\).png);">
                    <div class="card-overlay">
                        <h2 class="card-title">Oficina</h2>
                    </div>
                </div>
                <div class="category-card" style="background-image: url(img/descarga\ \(3\).jpg);">
                    <div class="card-overlay">
                        <h2 class="card-title">Salón</h2>
                    </div>
                </div>
                <div class="category-card" style="background-image: url(img/descarga\ \(2\).jpg);">
                    <div class="card-overlay">
                        <h2 class="card-title">Cocina</h2>
                    </div>
                </div>
                <div class="category-card" style="background-image: url(img/luminárias\ artesanais\ lindas.jpg);">
                    <div class="card-overlay">
                        <h2 class="card-title">Iluminación</h2>
                    </div>
                </div>
                <div class="category-card" style="background-image: url(img/descarga\ \(4\).jpg);">
                    <div class="card-overlay">
                        <h2 class="card-title">Decoración</h2>
                    </div>
                </div>
            </div>
        </div>

        <button class="slider-arrow next" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></button>
    </section>
</main>


<script src="script.js"></script>

</body>
</html>
